<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
 
  <link rel="stylesheet" href="../CSS/style.css" />
</head>
<body>
 
  <div class="card">
    <h1>Sign Up</h1>
 
    <form id="signupForm" novalidate>
 
      <div class="field">
        <label for="username">Username:</label>
        <input type="text" id="username" placeholder="Enter your username" />
        <span class="error-msg" id="usernameError">
          Username must be between 3 and 25 characters.
        </span>
      </div>
 
      <div class="field">
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter your email" />
        <span class="error-msg" id="emailError">
          Please enter a valid email address.
        </span>
      </div>
 
      <div class="field">
        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Enter your password" />
        <span class="error-msg" id="passwordError">
          Password must have at least 8 characters that include at least
          1 lowercase character, 1 uppercase character, 1 number, and
          1 special character in (!@#$%^&*)
        </span>
      </div>
 
      <div class="field">
        <label for="confirmPassword">Confirm Password:</label>
        <input type="password" id="confirmPassword" placeholder="Reenter your password" />
        <span class="error-msg" id="confirmPasswordError">
          Please enter the password again
        </span>
      </div>
 
      <button type="submit">SIGN UP</button>
 
    </form>
  </div>
 
  <script type="module" src="../JavaScript/Main.js"></script>
 
</body>
</html>
