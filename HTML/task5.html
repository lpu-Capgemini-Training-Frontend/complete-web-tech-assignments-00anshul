<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h4 style="margin-left: 40%">Please complete all the information below</h4>
    <form action="" >
        <fieldset>
        <legend>Sign Up Here</legend> 
        <div style="margin-left: 35%;"> 
        <label for="name">Name</label>
        <br>
        <input type="text" name="text" value="firstname">
        <input type="text" name="text" id="" value="lastname" style="margin-left: 10%;">
        <br>
        <br>
        <label for="email">Email</label>
        <label for="contact" style="margin-left: 24%;">Contact</label>
        <br>

        <input type="email" name="email" id="" value="example123@gmail.com">
        <input type="text" name="contact" id="" value="+91 1234567890" style="margin-left: 10%;">
        <br>
        <br>
        <label for="password">Password</label>
        <br>
        <input type="password" name="password" id="" value="strong password">
        <br>
        <br>
        <label for="profile">Profile</label>
        <br>
        <input type="file" name="Profile" id="" value="" >
        <br>
        <br>
        <button>Submit</button>
        </div>
        </fieldset>
    </form>
</body>
</html>
