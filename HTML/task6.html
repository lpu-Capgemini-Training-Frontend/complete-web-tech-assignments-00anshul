<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>Application Details</legend>
           
    
    <br>
    <label>First Name: <input type="text" name="firstname"></label> <br><br>
 
    <label>Last Name: <input type="text" name="lastname"></label> <br><br>
 
    <label>Email: <input type="text" name="email" style="margin-left: 6%;"></label> <br><br>
 
    Gender: <br><br>
    <label>Male <input type="radio" name="gender" value="male"></label><br>
    <label>Female <input type="radio" name="gender" value="female"></label> <br><br>
 
    <label>Contact: <input type="text" name="contact"></label> <br><br>
 
    <label>Qualification: <input type="file" name="qualification"></label> <br><br>
 
    <label>Joining Date: <input type="date" name="joiningdate"></label> <br><br>
 
    Skills:
    <label><input type="checkbox" name="skills" value="javascript"> JavaScript</label>
    <label><input type="checkbox" name="skills" value="java"> Java</label> <br><br>
    <label><input type="checkbox" name="skills" value="react"> React</label>
    <label><input type="checkbox" name="skills" value="express"> Express</label> <br><br>
    <label><input type="checkbox" name="skills" value="python"> Python</label>
    <label><input type="checkbox" name="skills" value="sql"> SQL</label> <br><br>
 
    <label>Year of Experience: <input type="range" name="experience"></label> <br><br>
 
    <label>Work Location:
    <select name="worklocation">
      <option value="">Default</option>
      <option value="delhi">Delhi</option>
      <option value="mumbai">Mumbai</option>
      <option value="bangalore">Bangalore</option>
    </select>
    </label> <br><br>
 
    <label>Address: <textarea name="address" rows="3" cols="30"></textarea></label> <br><br>
 
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">
 
        </fieldset>
    </form>
</body>
</html>
